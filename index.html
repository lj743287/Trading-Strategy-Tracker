<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Trade Manager</title>
<style>
  :root{
    --bg:#e9e7e1; --card:#ffffff; --ink:#0f1822; --muted:#6b7480; --line:#e7e9ec;
    --navy:#1d2733; --navy2:#27313e;
    --green:#16a34a; --greenbg:#e7f6ec; --red:#dc2626; --redbg:#fdecec;
    --amber:#c2810b; --blue:#2563eb; --bluebg:#e8f0fe;
    --shadow:0 1px 2px rgba(16,24,34,.06),0 6px 20px rgba(16,24,34,.06);
    --r:16px;
  }
  *{box-sizing:border-box}
  html,body{margin:0}
  body{
    background:var(--bg); color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    font-size:15px; line-height:1.45; -webkit-font-smoothing:antialiased;
  }
  .num{font-variant-numeric:tabular-nums}
  .wrap{max-width:560px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column}
  /* header */
  header{background:var(--navy);color:#fff;padding:14px 16px 0}
  .htop{display:flex;align-items:center;justify-content:space-between;gap:10px}
  .htop h1{font-size:20px;font-weight:700;margin:0;letter-spacing:.2px}
  .hbtns{display:flex;gap:8px}
  .hbtn{background:var(--navy2);color:#dfe4ea;border:1px solid #3a4756;border-radius:10px;
        padding:8px 12px;font-size:13px;font-weight:600;cursor:pointer}
  .hbtn:hover{background:#313c4a}
  nav{display:flex;gap:4px;margin-top:14px}
  .tab{flex:1;background:none;border:none;color:#9aa6b3;font-size:13.5px;font-weight:600;
       padding:10px 4px 12px;cursor:pointer;border-bottom:2px solid transparent}
  .tab.active{color:#fff;border-bottom-color:var(--blue)}
  .strip{display:flex;align-items:center;gap:12px;background:var(--navy2);
         margin:0 -16px;padding:9px 16px;font-size:13px;color:#aeb8c4}
  .regime{font-weight:800;font-size:11px;letter-spacing:.5px;padding:3px 9px;border-radius:6px;cursor:pointer}
  .regime.bear{background:#4a1d1d;color:#ff8c8c}
  .regime.bull{background:#13351f;color:#7ee2a3}
  .strip .total{color:#fff;font-weight:700;font-size:14px}
  .strip .fx{margin-left:auto}
  .strip .upd{font-size:11px;color:#8a95a3;margin-left:auto}
  /* main */
  main{padding:16px;flex:1}
  .sectlabel{font-size:11px;font-weight:700;letter-spacing:1.4px;color:var(--muted);
             text-transform:uppercase;margin:2px 2px 12px}
  /* card */
  .card{background:var(--card);border-radius:var(--r);box-shadow:var(--shadow);margin-bottom:16px;overflow:hidden}
  .chead{padding:14px 16px 12px;border-bottom:1px solid var(--line)}
  .crow1{display:flex;align-items:flex-start;justify-content:space-between;gap:10px}
  .tkwrap{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
  .tk{font-size:21px;font-weight:800;letter-spacing:.3px}
  .badge{font-size:11px;font-weight:700;padding:3px 8px;border-radius:6px}
  .b-be{background:var(--bluebg);color:var(--blue)}
  .b-partial{background:#fdf0d9;color:var(--amber)}
  .b-orig{background:#eef0f2;color:var(--muted)}
  .b-target{background:var(--greenbg);color:var(--green)}
  .bigret{text-align:right}
  .bigret .pct{font-size:21px;font-weight:800}
  .bigret .amt{font-size:13px;font-weight:600;color:var(--muted)}
  .pos{color:var(--green)} .neg{color:var(--red)}
  .sub{margin-top:4px;font-size:12.5px;color:var(--muted)}
  .sub b{color:var(--ink);font-weight:600}
  /* slider */
  .slider{padding:18px 16px 14px}
  .track{position:relative;height:10px;border-radius:6px;background:#edeef0;margin:22px 6px 18px}
  .fill{position:absolute;top:0;bottom:0;border-radius:6px}
  .mk{position:absolute;top:50%;transform:translate(-50%,-50%)}
  .mk-tl{font-size:10px;color:var(--muted);top:-20px;transform:translateX(-50%);font-weight:600}
  .mk-line{width:3px;height:18px;border-radius:2px;top:-4px}
  .mk-entry{border-left:6px solid transparent;border-right:6px solid transparent;border-top:8px solid var(--red);top:-13px;height:0;width:0}
  .mk-dot{width:18px;height:18px;border-radius:50%;border:3px solid #fff;box-shadow:0 1px 4px rgba(0,0,0,.25)}
  .mk-diam{width:13px;height:13px;background:#fff;border:2px solid var(--amber);transform:translate(-50%,-50%) rotate(45deg)}
  .axis{font-size:10px;color:var(--muted);font-weight:600}
  /* detail rows */
  .rows{padding:6px 16px 14px}
  .dr{display:flex;justify-content:space-between;padding:5px 0;font-size:14px}
  .dr .k{color:var(--muted)}
  .dr .v{font-weight:600}
  .dr .v.mono{font-variant-numeric:tabular-nums}
  .muted{color:var(--muted)}
  /* advice */
  .advice{margin:4px 16px 14px;border:1px solid var(--line);border-radius:12px;overflow:hidden}
  .adv-head{display:flex;align-items:center;gap:8px;padding:9px 12px;background:#f7f8f9;font-size:12px;font-weight:700;color:var(--muted)}
  .adv-act{margin-left:auto;font-size:11px;font-weight:800;padding:3px 9px;border-radius:6px}
  .act-hold{background:#eef0f2;color:#586472}
  .act-good{background:var(--greenbg);color:var(--green)}
  .act-warn{background:#fdf0d9;color:var(--amber)}
  .act-danger{background:var(--redbg);color:var(--red)}
  .adv-body{padding:10px 12px;font-size:13.5px;color:#2a323b}
  .adv-claude{border-top:1px dashed var(--line);padding:10px 12px;font-size:13.5px;color:#2a323b;white-space:pre-wrap}
  .adv-claude .tag{font-size:11px;font-weight:700;color:var(--blue);display:block;margin-bottom:4px}
  /* buttons */
  .acts{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:0 16px 16px}
  .btn{padding:11px;border-radius:11px;font-size:14px;font-weight:700;cursor:pointer;border:1.5px solid;background:#fff;text-align:center}
  .btn-claude{grid-column:1 / -1;border-color:var(--blue);color:var(--blue);background:var(--bluebg)}
  .btn-claude:hover{background:#dbe7fd}
  .btn-partial{border-color:#bfe3cb;color:var(--green);background:var(--greenbg)}
  .btn-edit{border-color:var(--line);color:#3a424c}
  .btn-close{border-color:#f3c7c7;color:var(--red);background:var(--redbg)}
  .btn-trash{border-color:var(--line);color:var(--muted);max-width:64px}
  .btn[disabled]{opacity:.5;cursor:default}
  .actrow{display:flex;gap:10px;padding:0 16px 16px}
  .actrow .btn{flex:1}
  /* generic */
  .empty{background:var(--card);border-radius:var(--r);box-shadow:var(--shadow);padding:30px 20px;text-align:center;color:var(--muted)}
  .empty b{color:var(--ink)}
  .addbtn{width:100%;padding:14px;border-radius:var(--r);border:1.5px dashed #c4cad1;background:#fff;
          color:var(--blue);font-weight:700;font-size:15px;cursor:pointer;margin-bottom:16px}
  .addbtn:hover{background:#f6f9ff}
  .panel{background:var(--card);border-radius:var(--r);box-shadow:var(--shadow);padding:16px;margin-bottom:16px}
  .panel h3{margin:0 0 12px;font-size:15px}
  .stat{display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px solid var(--line);font-size:14px}
  .stat:last-child{border-bottom:none}
  .stat .k{color:var(--muted)} .stat .v{font-weight:700;font-variant-numeric:tabular-nums}
  .kpis{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px}
  .kpi{background:var(--card);border-radius:14px;box-shadow:var(--shadow);padding:14px}
  .kpi .lbl{font-size:11px;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:.6px}
  .kpi .big{font-size:22px;font-weight:800;margin-top:4px;font-variant-numeric:tabular-nums}
  .ruleli{font-size:13.5px;color:#2a323b;padding:7px 0 7px 22px;position:relative;border-bottom:1px solid var(--line)}
  .ruleli:last-child{border-bottom:none}
  .ruleli::before{content:"";position:absolute;left:4px;top:13px;width:7px;height:7px;border-radius:2px;background:var(--blue)}
  .note{font-size:12px;color:var(--muted);background:#f7f8f9;border-radius:10px;padding:10px 12px;margin-top:10px}
  .recon{padding:8px 0;border-bottom:1px solid var(--line)}
  .recon:last-of-type{border-bottom:none}
  .recon-top{display:flex;justify-content:space-between;align-items:baseline}
  .recon-top .rtk{font-weight:800;font-size:15px}
  .recon-top .rpnl{font-weight:700;font-variant-numeric:tabular-nums}
  .recon-legs{font-size:12px;color:var(--muted);margin-top:2px}
  /* modal */
  .scrim{position:fixed;inset:0;background:rgba(15,24,34,.45);display:none;align-items:flex-end;justify-content:center;z-index:50}
  .scrim.on{display:flex}
  .modal{background:#fff;width:100%;max-width:560px;border-radius:18px 18px 0 0;padding:18px 16px 22px;max-height:92vh;overflow:auto}
  @media(min-width:560px){.scrim{align-items:center}.modal{border-radius:18px}}
  .modal h2{margin:0 0 14px;font-size:18px}
  .field{margin-bottom:12px}
  .field label{display:block;font-size:12px;font-weight:700;color:var(--muted);margin-bottom:5px}
  .field input,.field select,.field textarea{width:100%;padding:11px 12px;border:1.5px solid var(--line);border-radius:11px;font-size:15px;font-family:inherit;background:#fff}
  .field input:focus,.field textarea:focus,.field select:focus{outline:none;border-color:var(--blue)}
  .field .hint{font-size:11px;color:var(--muted);margin-top:4px}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  .mact{display:flex;gap:10px;margin-top:8px}
  .chips{display:flex;gap:8px;flex-wrap:wrap}
  .chip{padding:7px 12px;border-radius:9px;border:1.5px solid var(--line);background:#fff;font-size:13px;font-weight:700;color:#3a424c;cursor:pointer}
  .chip:hover{border-color:var(--blue);color:var(--blue)}
  .mact .btn{flex:1}
  .btn-primary{background:var(--blue);color:#fff;border-color:var(--blue)}
  .btn-ghost{background:#fff;border-color:var(--line);color:#3a424c}
  .toast{position:fixed;left:50%;bottom:24px;transform:translateX(-50%);background:var(--navy);color:#fff;
         padding:10px 16px;border-radius:10px;font-size:13px;z-index:60;opacity:0;transition:opacity .2s;pointer-events:none}
  .toast.on{opacity:1}
  .spin{display:inline-block;width:13px;height:13px;border:2px solid currentColor;border-right-color:transparent;border-radius:50%;animation:sp .6s linear infinite;vertical-align:-2px}
  @keyframes sp{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="htop">
      <h1>Trade Manager</h1>
      <div class="hbtns">
        <button class="hbtn" id="refreshBtn">↻ Refresh</button>
        <button class="hbtn" id="settingsBtn">⚙ Settings</button>
      </div>
    </div>
    <nav id="tabs">
      <button class="tab active" data-tab="trades">Trades</button>
      <button class="tab" data-tab="portfolio">Portfolio</button>
      <button class="tab" data-tab="analytics">Analytics</button>
      <button class="tab" data-tab="strategy">Strategy</button>
    </nav>
    <div class="strip">
      <span class="regime bear" id="regimeBadge">BEAR</span>
      <span class="total" id="totalEquity">$0 total</span>
      <span class="upd" id="updLabel"></span>
    </div>
  </header>
  <main id="view"></main>
</div>

<div class="scrim" id="scrim"><div class="modal" id="modal"></div></div>
<div class="toast" id="toast"></div>

<script>
"use strict";
/* ============================== storage ============================== */
const KEY="tradeManager.v1";
let mem=null; // in-memory fallback if localStorage blocked (e.g. inside a preview iframe)
function loadRaw(){ try{return localStorage.getItem(KEY);}catch(e){return mem;} }
function saveRaw(v){ try{localStorage.setItem(KEY,v);}catch(e){mem=v;} }

const DEFAULTS={
  trades:[],
  equityLog:[],                       // [{d:"YYYY-MM-DD", eq:Number}] — daily total-equity snapshots
  sync:{lastHash:"", lastTs:0},        // cloud-sync bookkeeping (local only)
  settings:{
    apiKey:"", model:"claude-sonnet-4-6",
    twelveKey:"", autoRefreshMin:0,
    githubToken:"", gistId:"",         // cloud sync (device-local, never uploaded)
    startingPot:200000, currency:"$", fx:1, regime:"bear", cashAdjust:0,
    positionSize:15000,
    targetPct:0.45, beTriggerPct:0.025, partialPct:0.15, partialFrac:0.25,
    minStopWarn:0.02, maxStopWarn:0.08
  }
};
let state=load();
function load(){
  const raw=loadRaw();
  if(!raw) return structuredClone(DEFAULTS);
  try{ const p=JSON.parse(raw);
    const settings=Object.assign({},DEFAULTS.settings,p.settings||{});
    settings.currency="$"; settings.fx=1;   // dollar-native: ignore any legacy GBP/FX
    return {
      trades:p.trades||[],
      equityLog:Array.isArray(p.equityLog)?p.equityLog:[],
      sync:Object.assign({},DEFAULTS.sync,p.sync||{}),
      settings
    };
  }catch(e){ return structuredClone(DEFAULTS); }
}
function persist(){ recordEquity(); saveRaw(JSON.stringify(state)); }

/* ============================== helpers ============================== */
const S=()=>state.settings;
const uid=()=>Date.now().toString(36)+Math.random().toString(36).slice(2,6);
const fmtUSD=(n)=>"$"+Math.round(n).toLocaleString("en-US");
const fmtUSD2=(n)=>"$"+n.toLocaleString("en-US",{minimumFractionDigits:2,maximumFractionDigits:2});
const cur=()=>S().currency;
const fmtCur=(n)=>cur()+Math.round(n).toLocaleString("en-US");
const pctTxt=(x)=>(x>=0?"+":"")+(x*100).toFixed(1)+"%";
const today=()=> new Date().toISOString().slice(0,10);
function daysBetween(a,b){ return Math.max(0,Math.round((new Date(b)-new Date(a))/864e5)); }
function toast(msg){ const t=document.getElementById("toast"); t.textContent=msg; t.classList.add("on"); clearTimeout(t._t); t._t=setTimeout(()=>t.classList.remove("on"),1900); }

/* per-trade derived numbers */
function remShares(t){ const sold=(t.partials||[]).reduce((s,p)=>s+p.shares,0); return Math.max(0,t.shares-sold); }
function partialRealizedUSD(t){ return (t.partials||[]).reduce((s,p)=>s+p.shares*(p.price-t.entry),0); }
function targetPrice(t){ return t.entry*(1+S().targetPct); }
function initStopPct(t){ return (t.entry-t.initialStop)/t.entry; }
function unrealUSD(t){ return remShares(t)*(t.currentPrice-t.entry); }
function retPct(t){ return t.currentPrice/t.entry-1; }
function posValueUSD(t){ return remShares(t)*t.entry; }      // cost basis (capital committed)
function marketValueUSD(t){ return remShares(t)*t.currentPrice; } // what the holding is worth now
function maxFurtherLossUSD(t){ return remShares(t)*(t.currentStop-t.currentPrice); }
function beThreshold(t){ return t.entry*(1+S().beTriggerPct); }
/* Last CONFIRMED daily close. While the market is open, today's print is not a close yet, so the
   most recent confirmed close is the previous close — but only valid as a *post-entry* close if the
   trade predates today (a same-day entry has no confirmed close since entry yet). When the market is
   closed, or we have no live quote, currentPrice stands in as the latest close (preserves old behaviour). */
function confirmedClose(t){
  if(t.marketOpen===true && isFinite(t.prevClose)){
    return (t.entryDate < today()) ? t.prevClose : t.entry; // same-day entry: nothing confirmed yet
  }
  return t.currentPrice;
}
function beConfirmed(t){ return confirmedClose(t)>=beThreshold(t); } // the real daily-close rule
function beTriggered(t){ return t.currentPrice>=beThreshold(t); }    // live/intraday proxy (for "watch")
function atBE(t){ return Math.abs(t.currentStop-t.entry)<1e-9; }

/* deterministic local strategy engine — runs free, no API */
function strategyVerdict(t){
  const r=retPct(t), tgt=S().targetPct, beT=S().beTriggerPct, pT=S().partialPct;
  const took=(t.partials||[]).length>0;
  if(t.currentPrice<=t.currentStop)
    return {act:"CLOSE",cls:"act-danger",txt:`Price ${fmtUSD2(t.currentPrice)} is at/through your stop ${fmtUSD2(t.currentStop)}. The rule is to be out — close it.`};
  if(r>=tgt-0.005)
    return {act:"TAKE TARGET",cls:"act-good",txt:`At ${pctTxt(r)} you're at the +${(tgt*100).toFixed(0)}% hard target. Sell the limit; don't chase higher.`};
  if(!atBE(t) && beConfirmed(t))
    return {act:"MOVE STOP → BE",cls:"act-warn",txt:`Confirmed close ${pctTxt(confirmedClose(t)/t.entry-1)} (≥ +${(beT*100).toFixed(1)}% trigger). Move stop to entry ${fmtUSD2(t.entry)} to remove downside.`};
  if(!took && r>=pT-0.003)
    return {act:"PARTIAL (optional)",cls:"act-warn",txt:`At +${(pT*100).toFixed(0)}% you may trim ${(S().partialFrac*100).toFixed(0)}% as psychological insurance — it's roughly P&L-neutral, so only if it helps you hold.`};
  if(!atBE(t) && beTriggered(t))
    return {act:"WATCH — BE on close",cls:"act-hold",txt:`Live ${pctTxt(r)} is past the +${(beT*100).toFixed(1)}% trigger, but breakeven is a daily-close rule. Move the stop to ${fmtUSD2(t.entry)} only if it closes here.`};
  return {act:"HOLD",cls:"act-hold",txt:`At ${pctTxt(r)} with stop ${atBE(t)?"at breakeven":fmtUSD2(t.currentStop)}. Nothing to do — let it work toward +${(tgt*100).toFixed(0)}%.`};
}
function statusBadge(t){
  const took=(t.partials||[]).length>0;
  if(retPct(t)>=S().targetPct-0.005) return {t:"At target",c:"b-target"};
  if(took) return {t:"Partial taken",c:"b-partial"};
  if(atBE(t)) return {t:"At breakeven",c:"b-be"};
  return {t:"Original stop",c:"b-orig"};
}

/* portfolio aggregates (GBP) */
function agg(){
  const fx=S().fx||1, openT=state.trades.filter(t=>t.status==="open"), closedT=state.trades.filter(t=>t.status==="closed");
  const usd2gbp=(u)=>u/fx;
  let realizedUSD=0;
  closedT.forEach(t=>{ realizedUSD+= (t.shares-(t.partials||[]).reduce((s,p)=>s+p.shares,0))*(t.exitPrice-t.entry) + partialRealizedUSD(t); });
  openT.forEach(t=> realizedUSD+=partialRealizedUSD(t));
  const unrealUSDtot=openT.reduce((s,t)=>s+unrealUSD(t),0);
  const deployedMktUSD=openT.reduce((s,t)=>s+remShares(t)*t.currentPrice,0);
  const deployedCostUSD=openT.reduce((s,t)=>s+posValueUSD(t),0);
  const startPot=S().startingPot, cashAdj=S().cashAdjust||0;
  const equity=startPot+usd2gbp(realizedUSD)+usd2gbp(unrealUSDtot)+cashAdj;
  const cash=startPot+usd2gbp(realizedUSD)-usd2gbp(deployedCostUSD)+cashAdj;
  return {fx,openT,closedT,realizedGBP:usd2gbp(realizedUSD),unrealGBP:usd2gbp(unrealUSDtot),
    deployedMktGBP:usd2gbp(deployedMktUSD),equity,cash,startPot,cashAdj};
}

/* total realized USD for one trade: banked partials + (if closed) remaining shares at exit.
   This is the reconciliation — e.g. a 25%/25%/50% scale-out sums all three legs. */
function tradeRealizedUSD(t){
  let v=partialRealizedUSD(t);
  if(t.status==="closed" && t.exitPrice!=null) v+=remShares(t)*(t.exitPrice-t.entry);
  return v;
}

/* daily total-equity snapshot — one point per calendar day, last write wins; never throws */
function recordEquity(){
  try{
    const eq=agg().equity;
    if(!isFinite(eq)) return;
    const d=today(), log=state.equityLog||(state.equityLog=[]);
    const last=log[log.length-1];
    if(last && last.d===d) last.eq=eq; else log.push({d,eq});
    if(log.length>800) log.splice(0,log.length-800);
  }catch(e){}
}

/* progress series for the equity graph: anchored at the baseline budget, then daily snapshots */
function progressSeries(a){
  const log=(state.equityLog||[]).filter(p=>p&&isFinite(p.eq)&&p.d).slice().sort((x,y)=>x.d<y.d?-1:1);
  const entryDates=state.trades.map(t=>t.entryDate).filter(Boolean).sort();
  const firstDate=entryDates[0]||(log[0]&&log[0].d)||today();
  const pts=[{d:firstDate,eq:a.startPot}];                 // opening point = baseline budget
  log.forEach(p=>{ if(p.d>=firstDate) pts.push({d:p.d,eq:p.eq}); });
  const lastPt=pts[pts.length-1];
  if(lastPt.d!==today()) pts.push({d:today(),eq:a.equity}); else lastPt.eq=a.equity;
  return pts;
}

/* ============================== render ============================== */
let activeTab="trades";
function render(){
  // header strip
  const a=agg();
  document.getElementById("totalEquity").textContent=fmtCur(a.equity)+" total";
  const ul=document.getElementById("updLabel"); if(ul) ul.textContent=lastQuoteTs?agoText(lastQuoteTs):"";
  const rb=document.getElementById("regimeBadge"), bull=S().regime==="bull";
  rb.textContent=bull?"BULL":"BEAR"; rb.className="regime "+(bull?"bull":"bear");
  document.querySelectorAll(".tab").forEach(b=>b.classList.toggle("active",b.dataset.tab===activeTab));
  const v=document.getElementById("view");
  if(activeTab==="trades") v.innerHTML=viewTrades();
  else if(activeTab==="portfolio") v.innerHTML=viewPortfolio(a);
  else if(activeTab==="analytics") v.innerHTML=viewAnalytics(a);
  else v.innerHTML=viewStrategy();
}

function sliderHTML(t){
  const LO=-0.10, HI=0.50, span=HI-LO;
  const x=(p)=>Math.max(0,Math.min(100,((p-LO)/span)*100));
  const r=retPct(t), tgt=S().targetPct, pT=S().partialPct;
  const stopP=(t.currentStop-t.entry)/t.entry;
  const cx=x(r), zero=x(0), col=r>=0?"var(--green)":"var(--red)";
  const fillL=Math.min(cx,zero), fillW=Math.abs(cx-zero);
  return `<div class="slider">
    <div class="track">

function progressChartSVG(series,a){
  const W=480,H=140,pad=8;
  const t0=new Date(series[0].d).getTime(), t1=new Date(series[series.length-1].d).getTime(), span=(t1-t0)||1;
  const ys=series.map(p=>p.eq).concat([a.startPot]);
  const mn=Math.min(...ys), mx=Math.max(...ys), yspan=(mx-mn)||1;
  const sx=(d)=> pad+((new Date(d).getTime()-t0)/span)*(W-2*pad);
  const sy=(y)=> H-pad-((y-mn)/yspan)*(H-2*pad);
  const line=series.map((p,i)=>(i?'L':'M')+sx(p.d).toFixed(1)+' '+sy(p.eq).toFixed(1)).join(' ');
  const up=a.equity>=a.startPot, baseY=sy(a.startPot).toFixed(1);
  const area=`M ${sx(series[0].d).toFixed(1)} ${baseY} `+series.map(p=>'L'+sx(p.d).toFixed(1)+' '+sy(p.eq).toFixed(1)).join(' ')+` L ${sx(series[series.length-1].d).toFixed(1)} ${baseY} Z`;
  return `<svg viewBox="0 0 ${W} ${H}" width="100%" style="display:block">
    <path d="${area}" fill="${up?'rgba(22,163,74,.10)':'rgba(220,38,38,.10)'}"/>
    <line x1="${pad}" y1="${baseY}" x2="${W-pad}" y2="${baseY}" stroke="#c9ccd1" stroke-dasharray="4 4"/>
    <path d="${line}" fill="none" stroke="${up?'var(--green)':'var(--red)'}" stroke-width="2.5" stroke-linejoin="round"/>
  </svg>`;
}

function viewAnalytics(a){
  const c=a.closedT;
  if(!c.length) return `<div class="empty"><b>No closed trades yet.</b><br>Stats appear here as you bank trades, measured against your starting pot.</div>`;
  const rets=c.map(t=>{
    const rem=t.shares-(t.partials||[]).reduce((s,p)=>s+p.shares,0);
    const pnl=rem*(t.exitPrice-t.entry)+partialRealizedUSD(t);
    return {pnl, ret:(t.exitPrice/t.entry-1)};
  });
  const wins=rets.filter(x=>x.pnl>0), losses=rets.filter(x=>x.pnl<=0);
  const wr=wins.length/rets.length;
  const avg=rets.reduce((s,x)=>s+x.ret,0)/rets.length;
  const grossW=wins.reduce((s,x)=>s+x.pnl,0), grossL=Math.abs(losses.reduce((s,x)=>s+x.pnl,0));
  const pf=grossL>0?grossW/grossL:Infinity;
  const exp=rets.reduce((s,x)=>s+x.pnl,0)/rets.length;
  const hitTarget=rets.filter(x=>x.ret>=S().targetPct-0.01).length;
  const recon=c.slice().reverse().map(t=>{
    const real=tradeRealizedUSD(t), realGBP=real/(S().fx||1);
    const legs=(t.partials||[]).map(p=>`${p.shares}@${fmtUSD2(p.price)}`)
      .concat(remShares(t)>0?[`${remShares(t)}@${fmtUSD2(t.exitPrice)} close`]:[]).join(" · ");
    return `<div class="recon">
      <div class="recon-top"><span class="rtk">${escapeHtml(t.ticker)}</span>
        <span class="rpnl ${realGBP>=0?'pos':'neg'} num">${realGBP>=0?'+':'−'}${cur()+Math.round(Math.abs(realGBP)).toLocaleString('en-US')}</span></div>
      <div class="recon-legs num">${t.shares} sh from ${fmtUSD2(t.entry)} → ${legs||'closed'}</div>
    </div>`;
  }).join("");
  // equity curve (GBP) over closed sequence
  let eq=a.startPot, pts=[{x:0,y:eq}];
  c.forEach((t,i)=>{ const rem=t.shares-(t.partials||[]).reduce((s,p)=>s+p.shares,0);
    eq+=(rem*(t.exitPrice-t.entry)+partialRealizedUSD(t))/(S().fx||1); pts.push({x:i+1,y:eq}); });
  const ys=pts.map(p=>p.y), mn=Math.min(...ys), mx=Math.max(...ys), W=480,H=130,pad=6;
  const sx=(i)=> pad+(i/(pts.length-1||1))*(W-2*pad);
  const sy=(y)=> H-pad-((y-mn)/((mx-mn)||1))*(H-2*pad);
  const path=pts.map((p,i)=>(i?'L':'M')+sx(i).toFixed(1)+' '+sy(p.y).toFixed(1)).join(' ');
  return `
  <div class="kpis">
    <div class="kpi"><div class="lbl">Win rate</div><div class="big num">${(wr*100).toFixed(0)}%</div></div>
    <div class="kpi"><div class="lbl">Realised P&L</div><div class="big num ${a.realizedGBP>=0?'pos':'neg'}">${(a.realizedGBP>=0?'+':'−')+cur()+Math.round(Math.abs(a.realizedGBP)).toLocaleString('en-US')}</div></div>
  </div>
  <div class="panel">
    <h3>Equity curve (closed trades)</h3>
    <svg viewBox="0 0 ${W} ${H}" width="100%" style="display:block">
      <line x1="${pad}" y1="${sy(a.startPot).toFixed(1)}" x2="${W-pad}" y2="${sy(a.startPot).toFixed(1)}" stroke="#d8dbdf" stroke-dasharray="4 4"/>
      <path d="${path}" fill="none" stroke="${eq>=a.startPot?'var(--green)':'var(--red)'}" stroke-width="2.5" stroke-linejoin="round"/>
    </svg>
    <div class="note">Dashed line = starting pot (${fmtCur(a.startPot)}).</div>
  </div>
  <div class="panel">
    <h3>Trade stats vs strategy</h3>
    <div class="stat"><span class="k">Closed trades</span><span class="v">${c.length}</span></div>
    <div class="stat"><span class="k">Wins / losses</span><span class="v">${wins.length} / ${losses.length}</span></div>
    <div class="stat"><span class="k">Average return</span><span class="v ${avg>=0?'pos':'neg'}">${pctTxt(avg)}</span></div>
    <div class="stat"><span class="k">Profit factor</span><span class="v">${pf===Infinity?'∞':pf.toFixed(2)}</span></div>
    <div class="stat"><span class="k">Expectancy / trade</span><span class="v ${exp>=0?'pos':'neg'}">${fmtUSD(exp)}</span></div>
    <div class="stat"><span class="k">Reached +45% target</span><span class="v">${hitTarget} of ${c.length}</span></div>
  </div>
  <div class="panel">
    <h3>Closed-trade reconciliation</h3>
    ${recon}
    <div class="note">Each line folds every scale-out leg plus the final close into one realised figure (USD).</div>
  </div>`;
}

function saveTrade(id){
  const ticker=val("f_ticker").toUpperCase(), entry=num("f_entry"), shares=num("f_shares"),
        stop=num("f_stop"), curp=num("f_cur"), date=val("f_date")||today();
  if(!ticker||entry==null||shares==null||stop==null){ toast("Fill ticker, entry, shares and stop"); return; }
  const cur=curp!=null?curp:entry;
  if(id){
    const t=state.trades.find(x=>x.id===id);
    Object.assign(t,{ticker,entry,shares,initialStop:stop,currentPrice:cur,entryDate:date});
    if(num("f_curstop")!=null) t.currentStop=num("f_curstop");
  }else{
    state.trades.push({id:uid(),ticker,entry,shares,initialStop:stop,currentStop:stop,
      currentPrice:cur,entryDate:date,status:"open",partials:[],advice:null});
    const sd=(entry-stop)/entry;
    if(sd>S().maxStopWarn) toast(`Heads up: stop is ${(sd*100).toFixed(1)}% wide (rule: avoid > ${(S().maxStopWarn*100).toFixed(0)}%)`);
  }

function doPartial(id){
  const t=state.trades.find(x=>x.id===id); const sh=num("p_shares"), pr=num("p_price");

  t.partials=t.partials||[]; t.partials.push({shares:sh,price:pr,date:today()});
  persist(); closeModal(); render();
  toast(remShares(t)===0 ? `${t.ticker} fully scaled out — close it to finish` : `Banked ${sh} @ ${fmtUSD2(pr)}`);
}
function doClose(id){
  const t=state.trades.find(x=>x.id===id); const pr=num("c_price"), d=val("c_date")||today();
  const rem=remShares(t);
  if(rem>0 && pr==null){ toast("Enter exit price"); return; }

  t.exitPrice=(pr!=null?pr:(t.partials&&t.partials.length?t.partials[t.partials.length-1].price:t.entry));
  t.exitDate=d; if(rem>0) t.currentPrice=t.exitPrice;

async function askClaude(t,btn){
  const s=S();
  if(!s.apiKey){ openModal(settingsForm()); toast("Add your API key to enable Claude"); return; }
  const label=btn.textContent; btn.disabled=true; btn.innerHTML='<span class="spin"></span> Analysing chart…';

  // Pull daily OHLC for a technical read; degrade gracefully if unavailable.
  let taBlock="", taNote="";
  if(s.twelveKey){
    try{
      const bars=await fetchDailyBars(t.ticker,160);
      if(bars.length>=20){ taBlock=buildTAText(computeTA(bars),bars); }
      else { taNote=`(only ${bars.length} daily bars returned — using position numbers only)`; }
    }catch(e){ taNote=`(couldn't load Twelve Data bars: ${e.message} — using position numbers only)`; }
  } else {
    taNote="(no Twelve Data key set — analysis uses position numbers only; add a key in Settings for a full chart read)";
  }

  const sys=`You are a disciplined swing-trading assistant analysing ONE open position for the user, a US momentum/breakout swing trader (Qullamaggie-style: enter on breakouts, ride the trend, sell into strength or when the trend structure breaks). You combine the user's fixed rule set with a technical read of the supplied DAILY bars. You do NOT predict the market or give generic advice — you judge THIS chart and THIS position.

RULE SET:
- Fixed $${s.positionSize} positions; initial stop = the opening-day low.
- Hard take-profit at +${(s.targetPct*100).toFixed(0)}% (don't chase past it).
- Move stop to entry once a daily CLOSE is >= +${(s.beTriggerPct*100).toFixed(1)}% above entry.
- Optional partial (~${(s.partialFrac*100).toFixed(0)}%) into strength — roughly P&L-neutral, psychological.
- Ride winners while the trend holds; the edge rests on a few big winners, so do not over-trim a healthy trend.
- New entries only in a bull regime (current: ${s.regime.toUpperCase()}).

HOW TO DECIDE (read the bars + indicators):
- HOLD: trend intact — price holding above the rising EMA10/EMA20, structure of higher lows, not climactic. Let it run.
- PARTIAL SELL: still trending but stretched — e.g. far extended above EMA10, a climactic up-day on big volume, or stalling into the prior high. Take some off, keep a runner.
- SELL ALL: trend broken or done — lost the EMA20/SMA50 with conviction, lower-low structure, distribution, hit the stop, or reached the +${(s.targetPct*100).toFixed(0)}% target.
- You may instead say MOVE STOP TO BREAKEVEN if that is the cleaner live action.

OUTPUT: First line = ONE action in caps: HOLD / PARTIAL SELL / SELL ALL / MOVE STOP TO BREAKEVEN. Then 2-4 short sentences citing specific levels and figures from the data (e.g. "extended +18% over EMA10", "lost EMA20 at $X on rising volume", "$Y below the 20-day high"). Be concrete. No disclaimers, no generic warnings.`;

  const usr=`Position: ${t.ticker} (OPEN)
Entry $${t.entry} on ${t.entryDate} (${daysBetween(t.entryDate,today())} days held)
Shares held: ${remShares(t)}${(t.partials||[]).length?` (already scaled out ${(t.partials).reduce((a,p)=>a+p.shares,0)} of ${t.shares})`:""}
Current price: $${t.currentPrice} (${pctTxt(retPct(t))} from entry)
Current stop: $${t.currentStop}${atBE(t)?" (at breakeven)":""} — initial risk was ${(initStopPct(t)*100).toFixed(1)}%
+${(s.targetPct*100).toFixed(0)}% target: $${targetPrice(t).toFixed(2)}
${taNote}
${taBlock}

Based on the technical picture of the daily chart and the rules, what should I do with this position right now — hold, partial sell, or sell everything?`;

  try{
    const res=await fetch("https://api.anthropic.com/v1/messages",{
      method:"POST",
      headers:{"x-api-key":s.apiKey,"anthropic-version":"2023-06-01","content-type":"application/json","anthropic-dangerous-direct-browser-access":"true"},
      body:JSON.stringify({model:s.model,max_tokens:500,system:sys,messages:[{role:"user",content:usr}]})
    });
    const data=await res.json();
    if(!res.ok){ throw new Error(data?.error?.message||("HTTP "+res.status)); }
    const text=(data.content||[]).filter(b=>b.type==="text").map(b=>b.text).join("\n").trim();
    t.advice={text:text||"(no response)",model:s.model,ts:Date.now()};
    persist(); render();
  }catch(err){
    btn.disabled=false; btn.textContent=label;

}

const tdNum=(x)=>{ const n=parseFloat(x); return isFinite(n)?n:null; };

/* --- daily OHLC + technical analysis (for Ask Claude) --- */
async function fetchDailyBars(symbol,count){
  const key=S().twelveKey;
  if(!key) throw new Error("no Twelve Data key");
  const url="https://api.twelvedata.com/time_series?symbol="+encodeURIComponent(symbol)
    +"&interval=1day&outputsize="+count+"&apikey="+encodeURIComponent(key);
  let res; try{ res=await fetch(url); }catch(e){ throw new Error("blocked (CORS/network)"); }
  let d; try{ d=await res.json(); }catch(e){ throw new Error("non-JSON response"); }
  if(!d || d.status==="error") throw new Error((d&&d.message)||"Twelve Data error");
  const vals=Array.isArray(d.values)?d.values:[];
  return vals.map(v=>({d:v.datetime,o:tdNum(v.open),h:tdNum(v.high),l:tdNum(v.low),c:tdNum(v.close),v:tdNum(v.volume)}))
             .filter(b=>b.c!=null).reverse(); // oldest → newest
}
function _sma(a,n){ if(a.length<n) return null; let s=0; for(let i=a.length-n;i<a.length;i++) s+=a[i]; return s/n; }
function _ema(a,n){ if(a.length<n) return null; const k=2/(n+1); let e=a.slice(0,n).reduce((x,y)=>x+y,0)/n; for(let i=n;i<a.length;i++) e=a[i]*k+e*(1-k); return e; }
function computeTA(bars){
  const c=bars.map(b=>b.c), n=bars.length, last=bars[n-1];
  const ema10=_ema(c,10), ema20=_ema(c,20), sma50=_sma(c,50), sma200=_sma(c,200);
  const adrN=Math.min(20,n); let adr=0,cnt=0;
  for(let i=n-adrN;i<n;i++){ if(bars[i].l>0){ adr+=(bars[i].h/bars[i].l-1); cnt++; } } adr=cnt?adr/cnt*100:null;
  const last20=bars.slice(-20), last7=bars.slice(-7);
  const hi20=Math.max(...last20.map(b=>b.h)), lo20=Math.min(...last20.map(b=>b.l));
  const winHi=Math.max(...bars.map(b=>b.h));
  const avgVol20=_sma(bars.map(b=>b.v||0),Math.min(20,n));
  const lastMovePct=n>=2?(last.c/bars[n-2].c-1)*100:0;
  const lo7=Math.min(...last7.map(b=>b.l)), hh7=Math.max(...last7.map(b=>b.h));
  const cons7=lo7>0?(hh7/lo7-1)*100:null;
  const aligned = ema10!=null&&ema20!=null&&sma50!=null && last.c>ema10&&ema10>ema20&&ema20>sma50;
  return {n,last,ema10,ema20,sma50,sma200,adr,hi20,lo20,winHi,avgVol20,lastMovePct,cons7,aligned};
}
function buildTAText(ta,bars){
  const f=(x,d=2)=>x==null?"n/a":(+x).toFixed(d);
  const pd=(p,m)=>m==null?"n/a":((p/m-1)*100>=0?"+":"")+((p/m-1)*100).toFixed(1)+"%";
  const last=ta.last;
  const rows=bars.slice(-30).map(b=>`${b.d}  O ${f(b.o)}  H ${f(b.h)}  L ${f(b.l)}  C ${f(b.c)}  V ${b.v||0}`).join("\n");
  return [
`DAILY TECHNICALS (${ta.n} bars, last close ${f(last.c)} on ${last.d}):`,
`EMA10 ${f(ta.ema10)} (price ${pd(last.c,ta.ema10)}), EMA20 ${f(ta.ema20)} (${pd(last.c,ta.ema20)}), SMA50 ${f(ta.sma50)} (${pd(last.c,ta.sma50)})${ta.sma200!=null?`, SMA200 ${f(ta.sma200)} (${pd(last.c,ta.sma200)})`:""}`,
`Uptrend stack price>EMA10>EMA20>SMA50: ${ta.aligned?"YES":"no"}`,
`ADR(20): ${f(ta.adr,1)}%/day`,
`20-day high ${f(ta.hi20)} (price ${pd(last.c,ta.hi20)} vs it), 20-day low ${f(ta.lo20)}, window high ${f(ta.winHi)} (price ${pd(last.c,ta.winHi)} off it)`,
`Last bar move ${ta.lastMovePct>=0?"+":""}${f(ta.lastMovePct,1)}%, volume ${ta.last.v||0} vs 20d-avg ${ta.avgVol20!=null?Math.round(ta.avgVol20):"n/a"}${ta.avgVol20?` (${(ta.last.v/ta.avgVol20).toFixed(2)}x)`:""}`,
`Last 7-bar range tightness: ${ta.cons7==null?"n/a":f(ta.cons7,1)+"%"}`,
``,
`RECENT DAILY BARS (oldest→newest):`,
rows
  ].join("\n");
}

function agoText(ts){
  const s=Math.round((Date.now()-ts)/1000);
  if(s<60) return "updated "+s+"s ago";
  const m=Math.round(s/60); if(m<60) return "updated "+m+"m ago";
  return "updated "+Math.round(m/60)+"h ago";
}

/* approximate US regular session: Mon–Fri 09:30–16:00 ET. Holidays not handled — the per-symbol
   is_market_open flag from the quote reflects reality anyway; worst case is one wasted call. */
function usMarketLikelyOpen(){
  try{
    const et=new Date(new Date().toLocaleString("en-US",{timeZone:"America/New_York"}));
    const day=et.getDay(); if(day===0||day===6) return false;
    const mins=et.getHours()*60+et.getMinutes();
    return mins>=570 && mins<960;
  }catch(e){ return true; }
}

/* one batched HTTP call for all open tickers → {SYM:{price,prevClose,marketOpen}} */
async function fetchQuotes(symbols){
  const key=S().twelveKey;
  if(!key) throw new Error("Add your Twelve Data key in Settings first");
  if(!symbols.length) return {};
  const url="https://api.twelvedata.com/quote?symbol="+encodeURIComponent(symbols.join(","))+"&apikey="+encodeURIComponent(key);
  let res;
  try{ res=await fetch(url); }
  catch(e){ throw new Error("Request blocked (likely CORS or no network) — see the live-prices note in Settings"); }
  let data;
  try{ data=await res.json(); }
  catch(e){ throw new Error("Twelve Data returned a non-JSON response (HTTP "+res.status+")"); }
  if(data && data.status==="error") throw new Error(data.message||("Twelve Data error "+(data.code||res.status)));
  const map=(symbols.length===1 && data && data.symbol) ? {[data.symbol]:data} : data;
  const out={};
  for(const sym of symbols){
    const k=Object.keys(map||{}).find(x=>x.toUpperCase()===sym.toUpperCase());
    const q=k?map[k]:null;
    if(!q || q.status==="error"){ out[sym]={error:(q&&q.message)||"no data"}; continue; }
    out[sym]={ price:tdNum(q.close), prevClose:tdNum(q.previous_close), marketOpen:q.is_market_open===true };
  }
  return out;
}

async function refreshPrices(manual){
  const open=state.trades.filter(t=>t.status==="open");
  const syms=[...new Set(open.map(t=>t.ticker.toUpperCase()))];
  const btn=document.getElementById("refreshBtn");
  if(!S().twelveKey){ render(); if(manual) toast(syms.length?"Add a Twelve Data key in Settings to pull live prices":"Refreshed"); return; }
  if(!syms.length){ render(); if(manual) toast("No open positions to price"); return; }
  if(refreshing) return;
  refreshing=true;
  if(btn){ btn.disabled=true; btn.dataset.label=btn.textContent; btn.textContent="↻ …"; }
  try{
    const q=await fetchQuotes(syms);
    let updated=0; const errs=[];
    open.forEach(t=>{
      const r=q[t.ticker.toUpperCase()];
      if(!r) return;
      if(r.error){ errs.push(t.ticker); return; }
      if(r.price!=null){ t.currentPrice=r.price; updated++; }
      if(r.prevClose!=null) t.prevClose=r.prevClose;
      t.marketOpen=r.marketOpen;
    });
    lastQuoteTs=Date.now(); persist(); render();
    if(manual||errs.length){
      let m=`Updated ${updated} ${updated===1?"price":"prices"}`;
      if(errs.length) m+=` · no data: ${errs.join(", ")}`;
      toast(m);
    }
  }catch(err){
    render(); toast(err.message||"Price refresh failed");
  }finally{
    refreshing=false;
    const b=document.getElementById("refreshBtn");
    if(b){ b.disabled=false; b.textContent=b.dataset.label||"↻ Refresh"; }
  }
}

function setupAutoRefresh(){
  if(autoTimer){ clearInterval(autoTimer); autoTimer=null; }
  const mins=+S().autoRefreshMin||0;
  if(mins>0 && S().twelveKey){
    autoTimer=setInterval(()=>{
      if(document.hidden) return;
      if(!usMarketLikelyOpen()) return;
      if(!state.trades.some(t=>t.status==="open")) return;
      refreshPrices(false);
    }, mins*60000);
  }
}

const GH_FILE="trade-manager.json";
const CRED_KEYS=["apiKey","twelveKey","githubToken","gistId"]; // never uploaded to the gist
let pendingCloud=null;

function settingsForCloud(){ const o={},s=S(); for(const k in s){ if(!CRED_KEYS.includes(k)) o[k]=s[k]; } return o; }
function syncablePayload(){ return {v:2, savedAt:new Date().toISOString(), trades:state.trades, equityLog:state.equityLog||[], settings:settingsForCloud()}; }
function hashStr(s){ let h=5381; for(let i=0;i<s.length;i++){ h=(((h<<5)+h)^s.charCodeAt(i))|0; } return (h>>>0).toString(36); }
function syncHash(p){ return hashStr(JSON.stringify({t:p.trades,e:p.equityLog,s:p.settings})); }
function localUnsynced(){ return syncHash(syncablePayload())!==state.sync.lastHash; }

function syncStatusText(){
  const s=S();
  if(!s.githubToken||!s.gistId) return "Not configured — add a token, then Create a gist (or paste an existing ID).";
  const when=state.sync.lastTs?agoText(state.sync.lastTs).replace("updated ","synced "):"never synced";
  return (state.sync.lastTs?`Last ${when}.`:"Never synced.")+(localUnsynced()?" Local changes not yet pushed.":" Up to date locally.");
}
function dataSummary(trades,equity,savedAt){
  const open=(trades||[]).filter(t=>t.status==="open").length, closed=(trades||[]).filter(t=>t.status==="closed").length;
  let s=`${open} open · ${closed} closed`;
  if(equity!=null) s+=` · ${fmtCur(equity)}`;
  if(savedAt) s+=` · saved ${new Date(savedAt).toLocaleString("en-GB")}`;
  return s;
}
function parseCloudPayload(content){
  if(!content) return null;
  try{ const p=JSON.parse(content); if(!p||typeof p!=="object") return null;
    return {trades:Array.isArray(p.trades)?p.trades:[], equityLog:Array.isArray(p.equityLog)?p.equityLog:[],
      settings:(p.settings&&typeof p.settings==="object")?p.settings:{}, savedAt:p.savedAt||null};
  }catch(e){ return null; }
}

function ghHeaders(){ return {"Authorization":"token "+S().githubToken,"Accept":"application/vnd.github+json","Content-Type":"application/json"}; }
async function ghCall(url,opts){
  let res;
  try{ res=await fetch(url,opts); }
  catch(e){ throw new Error("Network/CORS blocked the GitHub request"); }
  let d=null; try{ d=await res.json(); }catch(e){}
  if(!res.ok){
    if(res.status===401) throw new Error("GitHub rejected the token (401) — does it have gist scope?");
    if(res.status===404) throw new Error("Gist not found (404) — check the Gist ID");
    if(res.status===403) throw new Error("GitHub blocked it (403) — rate limit or missing scope");
    throw new Error("GitHub: "+((d&&d.message)||("HTTP "+res.status)));
  }
  return d;
}
async function gistGet(id){
  const d=await ghCall("https://api.github.com/gists/"+encodeURIComponent(id),{headers:ghHeaders()});
  const f=d.files&&d.files[GH_FILE];
  return { content:f?f.content:null, updatedAt:d.updated_at };
}
async function gistUpdate(id,content){
  return ghCall("https://api.github.com/gists/"+encodeURIComponent(id),
    {method:"PATCH",headers:ghHeaders(),body:JSON.stringify({files:{[GH_FILE]:{content}}})});
}
async function gistCreateApi(content){
  return ghCall("https://api.github.com/gists",
    {method:"POST",headers:ghHeaders(),body:JSON.stringify({description:"Trade Manager data",public:false,files:{[GH_FILE]:{content}}})});
}

/* --- create --- */
async function cloudCreate(){
  readSettingsFields();
  if(!S().githubToken){ toast("Add a GitHub token first"); return; }
  toast("Creating gist…");
  try{
    const payload=syncablePayload();
    const d=await gistCreateApi(JSON.stringify(payload,null,2));
    S().gistId=d.id; state.sync={lastHash:syncHash(payload),lastTs:Date.now()}; persist();
    openModal(settingsForm()); toast("Private gist created & data uploaded");
  }catch(err){ toast(err.message||"Create failed"); }
}

/* --- push (confirm first) --- */
async function cloudPushStart(){
  readSettingsFields();
  const s=S();
  if(!s.githubToken||!s.gistId){ toast("Add a token and Gist ID (or Create) first"); return; }
  toast("Checking cloud…");
  try{
    const got=await gistGet(s.gistId);
    const cloud=parseCloudPayload(got.content);
    const external = cloud ? (syncHash(cloud)!==state.sync.lastHash) : false;
    const localSum=dataSummary(state.trades,agg().equity);
    const cloudSum=cloud?dataSummary(cloud.trades,null,cloud.savedAt):"empty";
    openModal(confirmPushHTML(localSum,cloudSum,external));
  }catch(err){ toast(err.message||"Couldn't reach the gist"); }
}
function confirmPushHTML(localSum,cloudSum,external){
  return `<h2>Upload to cloud?</h2>
    <div class="note" style="margin-bottom:12px">This replaces the cloud copy with your current data.</div>
    <div class="stat"><span class="k">Uploading</span><span class="v" style="font-weight:600">${localSum}</span></div>
    <div class="stat"><span class="k">Cloud now holds</span><span class="v" style="font-weight:600">${cloudSum}</span></div>
    ${external?`<div class="note" style="background:var(--redbg);color:#a01919;margin-top:10px">⚠ The cloud copy changed since your last sync — possibly from another device. Uploading overwrites it.</div>`:""}
    <div class="mact" style="margin-top:14px"><button class="btn btn-ghost" data-m="settings">Cancel</button>
    <button class="btn btn-primary" data-m="cloudpush_do">Upload</button></div>`;
}
async function cloudPushDo(){
  const s=S();
  toast("Uploading…");
  try{
    const payload=syncablePayload();
    await gistUpdate(s.gistId,JSON.stringify(payload,null,2));
    state.sync={lastHash:syncHash(payload),lastTs:Date.now()}; persist();
    openModal(settingsForm()); toast("Pushed to cloud");
  }catch(err){ toast(err.message||"Upload failed"); openModal(settingsForm()); }
}

/* --- pull (confirm first) --- */
async function cloudPullStart(){
  readSettingsFields();
  const s=S();
  if(!s.githubToken||!s.gistId){ toast("Add a token and Gist ID first"); return; }
  toast("Reading cloud…");
  try{
    const got=await gistGet(s.gistId);
    const cloud=parseCloudPayload(got.content);
    if(!cloud){ toast("Cloud copy is empty or unreadable"); return; }
    pendingCloud=cloud;
    openModal(confirmPullHTML(dataSummary(cloud.trades,null,cloud.savedAt),localUnsynced()));
  }catch(err){ toast(err.message||"Couldn't read the gist"); }
}
function confirmPullHTML(cloudSum,localUns){
  return `<h2>Replace local with cloud?</h2>
    <div class="note" style="margin-bottom:12px">This replaces your local trades, history and strategy settings with the cloud copy. Your local API keys are kept.</div>
    <div class="stat"><span class="k">Cloud copy</span><span class="v" style="font-weight:600">${cloudSum}</span></div>
    ${localUns?`<div class="note" style="background:var(--redbg);color:#a01919;margin-top:10px">⚠ You have local changes that aren't pushed — they'll be lost.</div>`:""}
    <div class="mact" style="margin-top:14px"><button class="btn btn-ghost" data-m="settings">Cancel</button>
    <button class="btn btn-close" data-m="cloudpull_do">Replace local</button></div>`;
}
function cloudPullDo(){
  if(!pendingCloud){ openModal(settingsForm()); return; }
  const c=pendingCloud; pendingCloud=null;
  state.trades=c.trades||[];
  state.equityLog=c.equityLog||[];
  const s=S(); for(const k in c.settings){ if(!CRED_KEYS.includes(k)) s[k]=c.settings[k]; }
  state.sync={lastHash:syncHash(syncablePayload()),lastTs:Date.now()};
  persist(); setupAutoRefresh(); render();
  openModal(settingsForm()); toast("Pulled from cloud");
}

/* ============================== seed + boot ============================== */
function seedIfEmpty(){
  if(state.trades.length) return;
  // sample positions mirroring the reference screenshot so the UI isn't empty on first open
  state.trades=[
    {id:uid(),ticker:"VOYA",entry:85.65,shares:175,initialStop:82.10,currentStop:85.65,currentPrice:89.14,entryDate:isoMinus(5),status:"open",partials:[],advice:null},
    {id:uid(),ticker:"HPP",entry:13.07,shares:637,initialStop:12.40,currentStop:13.07,currentPrice:15.07,entryDate:isoMinus(8),status:"open",partials:[{shares:213,price:15.04,date:today()}],advice:null},
    {id:uid(),ticker:"LQDA",entry:42.10,shares:356,initialStop:41.20,currentStop:41.20,currentPrice:41.63,entryDate:isoMinus(2),status:"open",partials:[],advice:null}
  ];
  state.settings.startingPot=200000; state.settings.fx=1; persist();
}
function isoMinus(d){ const x=new Date(); x.setDate(x.getDate()-d); return x.toISOString().slice(0,10); }

seedIfEmpty();
render();
setupAutoRefresh();
setInterval(()=>{ const ul=document.getElementById("updLabel"); if(ul&&lastQuoteTs) ul.textContent=agoText(lastQuoteTs); },30000);
</script>
